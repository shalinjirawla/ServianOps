<div *ngIf="confirmSvc.state()" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-300" (click)="onCancel()"></div>

  <!-- Modal Panel -->
  <div class="relative w-full max-w-md transform overflow-hidden rounded-2xl bg-card border border-border p-6 shadow-2xl transition-all duration-300 animate-in scale-in duration-200">
    <div class="flex items-start gap-4">
      <div class="w-10 h-10 rounded-full bg-destructive/10 text-destructive flex items-center justify-center shrink-0">
        <app-icon name="alert-triangle" [size]="20"></app-icon>
      </div>
      <div class="space-y-1.5 flex-1">
        <h3 class="text-lg font-semibold text-foreground leading-none">{{ confirmSvc.state()?.title }}</h3>
        <p class="text-sm text-muted-foreground">{{ confirmSvc.state()?.message }}</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="mt-6 flex items-center justify-end gap-3">
      <button type="button" (click)="onCancel()" class="btn btn-sm btn-outline px-4 h-9">
        {{ confirmSvc.state()?.cancelBtnText || 'Cancel' }}
      </button>
      <button type="button" (click)="onConfirm()" class="btn btn-sm btn-destructive bg-gradient-to-r from-red-600 to-red-500 hover:from-red-700 hover:to-red-600 text-white border-0 shadow-lg shadow-red-500/20 px-4 h-9">
        {{ confirmSvc.state()?.confirmBtnText || 'Delete' }}
      </button>
    </div>
  </div>
</div>
