<header class="flex flex-col gap-3 border-b border-border bg-background/80 backdrop-blur px-4 md:px-6 py-3">
  <div class="flex items-center gap-3">
    <button type="button" class="btn btn-ghost btn-icon" (click)="handleToggle()">
      <app-icon name="menu" [size]="18"></app-icon>
    </button>

    <div class="hidden md:flex flex-1 max-w-md relative">
      <!-- <app-icon name="search" [size]="16" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground pointer-events-none"></app-icon> -->
      <input placeholder="Search jobs, clients, sites, POs..."
        class="input pl-9 h-10 bg-muted/50 border-transparent focus-visible:bg-background" />
      <kbd
        class="hidden lg:flex absolute right-3 top-1/2 -translate-y-1/2 text-[10px] font-mono px-1.5 py-0.5 rounded bg-background border border-border text-muted-foreground">⌘K</kbd>
    </div>

    <div class="ml-auto flex items-center gap-2">
      <!-- <button type="button" class="btn btn-sm btn-primary bg-gradient-primary shadow-elegant">
        <app-icon name="plus" [size]="16"></app-icon> New Job
      </button> -->
      <button type="button" class="btn btn-ghost btn-icon relative">
        <app-icon name="bell" [size]="16"></app-icon>
        <span
          class="badge absolute -top-0.5 -right-0.5 h-4 min-w-4 px-1 text-[10px] bg-accent text-accent-foreground border-0">4</span>
      </button>
      <div class="flex items-center gap-2 pl-2 border-l border-border ml-1">
        <div
          class="w-8 h-8 rounded-full bg-gradient-primary text-primary-foreground text-xs font-semibold grid place-items-center">
          {{ initials }}
        </div>
        <div class="hidden md:block">
          <div class="text-sm font-medium leading-tight">{{ name }}</div>
          <div class="text-[11px] text-muted-foreground leading-tight">
            {{ role }}@if (tenancyName) { — {{ tenancyName }} }
          </div>
        </div>
      </div>
    </div>
  </div>
  <div>
    <h1 class="font-display text-2xl font-bold tracking-tight">{{ title }}</h1>
    @if (subtitle) {
    <p class="text-sm text-muted-foreground">{{ subtitle }}</p>
    }
  </div>
</header>
